# Redeploy roster API on Vercel when website/api changes (requires repo secrets).
# In GitHub: Settings → Secrets → Actions → add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
name: Deploy roster API to Vercel

on:
  push:
    branches: [main]
    paths:
      - "website/api/**"
      - "website/vercel.json"
      - "vercel.json"
      - ".github/workflows/vercel-roster-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: "--prod"
